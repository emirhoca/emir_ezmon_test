name: Tests (pytest + ezmon)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: "pytest --ezmon (net db)"
    runs-on: macos-latest

    env:
      PY_VERSION: "3.12"
      TESTMON_NET_ENABLED: "true"
      TESTMON_SERVER: "https://ezmon.aloiz.ch"
      TESTMON_AUTH_TOKEN: "ezmon-ci-test-token-2024"   # ← this line changed
      REPO_ID: ${{ github.repository }}
      JOB_ID: "python-3.12-macos"
      RUN_ID: ${{ github.run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PY_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

          if [ -f pyproject.toml ] || [ -f setup.py ]; then
            pip install .
          else
            echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV
          fi

          pip install "git+https://github.com/andreas16700/pytest-testmon@main"

      - name: Run tests with ezmon + net db
        run: |
          pytest --ezmon