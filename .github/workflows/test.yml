name: Tests (pytest + ezmon NetDB)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  # NetDB configuration - direct server communication
  TESTMON_NET_ENABLED: "true"
  TESTMON_SERVER: "https://ezmon.aloiz.ch"
  TESTMON_AUTH_TOKEN: ${{ secrets.EZMON_AUTH_TOKEN }}

jobs:
  test:
    name: "pytest --ezmon (NetDB)"
    runs-on: macos-latest

    env:
      PY_VERSION: "3.12"
      REPO_ID: ${{ github.repository }}
      JOB_ID: "python-3.12-macos"
      RUN_ID: ${{ github.run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PY_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          # If requirements.txt exists, install it
          if [ -f requirements.txt ]; then
            echo "Installing requirements.txt..."
            pip install -r requirements.txt
          else
            echo "No requirements.txt found"
          fi

          # If pyproject.toml or setup.py exists, install project
          if [ -f pyproject.toml ] || [ -f setup.py ]; then
            echo "Installing project as package..."
            pip install .
          else
            echo "No build config found – adding project root to PYTHONPATH"
            export PYTHONPATH="${{ github.workspace }}"
            echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV
          fi

          # Install ezmon plugin fork with NetDB support
          pip install "git+https://github.com/andreas16700/pytest-testmon@main"

      - name: Debug ezmon setup
        run: |
          python -c "import ezmon; print('ezmon version:', ezmon.TESTMON_VERSION)"
          echo "NetDB enabled: $TESTMON_NET_ENABLED"
          echo "Server: $TESTMON_SERVER"
          echo "Repo ID: $REPO_ID"
          echo "Job ID: $JOB_ID"

      - name: Run tests with ezmon (NetDB)
        run: |
          pytest --ezmon -v